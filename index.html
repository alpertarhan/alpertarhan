<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- ponytail: this GitHub Pages site now redirects to the real site.
       The interactive terminal portfolio moved to alpertarhan.dev (rebuilt in Astro,
       same terminal aesthetic, plus a blog + i18n). This file is a pure redirector. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Alper Tarhan — redirecting…</title>
  <link rel="canonical" href="https://alpertarhan.dev/" />
  <meta http-equiv="refresh" content="0; url=https://alpertarhan.dev/" />
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0d1117; color: #c9d1d9;
      font-family: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
      text-align: center; padding: 2rem;
    }
    .box { max-width: 520px; }
    .prompt { color: #3fb950; }
    a { color: #58a6ff; }
    h1 { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { color: #8b949e; font-size: 0.95rem; line-height: 1.7; }
    .bar { height: 2px; background: #30363d; border-radius: 2px; overflow: hidden; margin: 1.5rem 0; }
    .bar > i { display: block; height: 100%; width: 40%; background: #3fb950; animation: slide 1s ease-in-out infinite; }
    @keyframes slide { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }
    @media (prefers-reduced-motion: reduce){ .bar > i { animation: none; width: 100%; } }
  </style>
  <script>
    // belt-and-suspenders: meta-refresh already redirects, JS makes it instant + preserves referrer
    window.location.replace("https://alpertarhan.dev/");
  </script>
</head>
<body>
  <main class="box">
    <p class="prompt">$ cd ~/portfolio &amp;&amp; open</p>
    <h1>redirecting to <a href="https://alpertarhan.dev/">alpertarhan.dev</a></h1>
    <div class="bar"><i></i></div>
    <p>The interactive terminal portfolio moved. If you are not redirected, <a href="https://alpertarhan.dev/">click here →</a></p>
  </main>
</body>
</html>
